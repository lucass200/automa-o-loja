<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repasse Central</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>🚗 Central JC MOTORS</h1>
        <p class="subtitle">Posts e Stories de todas as lojas — sem abrir o Instagram.</p>
        <div class="lojas-pill">
            <div id="lojasPillContainer" style="display:inline-flex;gap:0.4rem;flex-wrap:wrap;"></div>
            <button id="btnGerenciarLojas" class="atualizar-btn" style="margin-left:0.5rem">⚙️ Gerenciar Lojas</button>
            <button id="btnLinkCliente" class="tab" style="margin-left:0.5rem; background:rgba(255,255,255,0.05)">🔗
                Copiar Link P/ Clientes</button>
        </div>
    </header>

    <!-- Status -->
    <div class="status-bar">
        <span id="statusInfo" class="status-info"><span class="dot dot-gray"></span> Carregando...</span>
        <button id="btnAtualizar" class="atualizar-btn">🔄 Atualizar agora</button>
    </div>

    <div class="panel">

        <!-- Filtros Superiores -->
        <div class="search-wrap">
            <div class="search-box">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <circle cx="11" cy="11" r="8" />
                    <path d="m21 21-4.3-4.3" />
                </svg>
                <input id="fBusca" type="text" placeholder="Pesquisar Zafira, Corolla, SUV..." autocomplete="off">
            </div>
        </div>

        <div style="display: flex; justify-content: center; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap;">
            <div id="filtro-loja-wrapper" style="display: flex; align-items: center; gap: 0.5rem;">
                <label style="font-size: 0.8rem; color: #64748b; font-weight: 600;">🏪 LOJA:</label>
                <select id="fLoja"
                    style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #f1f5f9; padding: 0.4rem 0.8rem; border-radius: 0.5rem; font-family: inherit; outline: none;">
                    <option value="">Todas</option>
                </select>
            </div>
            <div style="display: flex; align-items: center; gap: 0.5rem;">
                <label style="font-size: 0.8rem; color: #64748b; font-weight: 600;">📊 ORDEM:</label>
                <select id="fOrdem"
                    style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #f1f5f9; padding: 0.4rem 0.8rem; border-radius: 0.5rem; font-family: inherit; outline: none;">
                    <option value="recente">Mais recentes</option>
                    <option value="menor-preco">Menor preço</option>
                    <option value="maior-preco">Maior preço</option>
                </select>
            </div>
            <button id="btnLimpar" class="tab" style="border-color: rgba(239, 68, 68, 0.2); color: #fca5a5;">✕
                Limpar</button>
        </div>

        <!-- Abas de Tipo -->
        <div class="tabs">
            <button class="tab active" data-f="todos">Todos</button>
            <button class="tab" data-f="posts">🖼️ Posts</button>
            <button class="tab" data-f="stories">📸 Stories</button>
        </div>

        <p class="result-count" id="resultCount"></p>
        <div id="notice" class="notice" style="display:none">📋 Exibindo dados de exemplo — rode
            <strong>scraper.py</strong></div>

        <!-- Cards Grid -->
        <main id="carGrid" class="grid"></main>
    </div>

    <!-- Modal Gerenciar Lojas -->
    <div id="modalLojas" class="modal-overlay" style="display:none">
        <div class="modal">
            <div class="modal-header">
                <h2>🏪 Lojas do Instagram</h2>
                <button class="btn-close" id="fecharModal">✕</button>
            </div>
            <div class="modal-body">
                <p class="muted-text">Adicione os <strong>@</strong> das lojas de repasse que deseja coletar.</p>

                <div class="add-loja-form">
                    <textarea id="inputNovaLoja" rows="3" placeholder="Ex: @loja1, @loja2..."></textarea>
                    <button id="btnAdicionarLoja" class="btn-primary">Adicionar</button>
                </div>

                <ul id="listaLojas" class="lojas-lista"></ul>

                <p style="font-size:0.75rem; color:#fca5a5; margin-top:1rem; text-align:center;">⚠️ Após alterar as
                    lojas, clique em "Atualizar agora".</p>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
